<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

.screen { display: none; flex-direction: column; min-height: 100vh; padding-bottom: 80px; }
.screen.active { display: flex; }

.header { padding: 52px 20px 12px; background: #f5f5f0; }
.greeting { font-size: 12px; color: #999; margin-bottom: 2px; font-weight: 400; }
.username { font-size: 22px; font-weight: 600; color: #1a1a1a; }

.hero-card { margin: 4px 16px 14px; background: #1a1a1a; border-radius: 22px; padding: 22px; }
.hero-label { font-size: 10px; color: #666; letter-spacing: 0.07em; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.hero-badge { background: #2a2a2a; color: #666; font-size: 9px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
.hero-num { font-size: 42px; font-weight: 600; color: #fff; margin: 4px 0 6px; letter-spacing: -1px; }
.hero-sub { font-size: 12px; color: #5dcaa5; font-weight: 500; }

.quick-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 0 16px 20px; }
.qs { background: #fff; border-radius: 16px; padding: 14px 10px; text-align: center; }
.qs-num { font-size: 22px; font-weight: 600; }
.qs-num.green { color: #1d9e75; }
.qs-num.red   { color: #e24b4a; }
.qs-num.gray  { color: #bbb; }
.qs-label { font-size: 10px; color: #bbb; margin-top: 3px; font-weight: 400; }

.section-header { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; margin-bottom: 10px; }
.section-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.see-all { font-size: 12px; color: #bbb; font-weight: 400; }

.card { background: #fff; border-radius: 18px; margin: 0 16px 8px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.card-icon { width: 40px; height: 40px; border-radius: 12px; background: #f5f5f0; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; color: #888; flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-company { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.card-role { font-size: 11px; color: #bbb; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 400; }
.card-right { text-align: right; flex-shrink: 0; }
.card-salary { font-size: 13px; font-weight: 500; color: #1a1a1a; }
.badge { font-size: 9px; font-weight: 600; padding: 3px 8px; border-radius: 20px; margin-top: 5px; display: inline-block; letter-spacing: 0.03em; }
.badge.invite { background: #e1f5ee; color: #0f6e56; }
.badge.reject { background: #fcebeb; color: #a32d2d; }
.badge.wait   { background: #f1efe8; color: #888; }

.empty-hint { text-align: center; padding: 40px 20px; font-size: 13px; color: #ccc; line-height: 1.8; font-weight: 400; }

.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 0.5px solid #eee; display: flex; padding: 10px 0 24px; z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
.nav-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.nav-label { font-size: 10px; color: #ccc; font-weight: 500; }
.nav-label.active { color: #1a1a1a; }

.fab-btn { width: 50px; height: 50px; border-radius: 50%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; margin-top: -10px; }
.fab-plus { color: #fff; font-size: 24px; font-weight: 300; line-height: 1; margin-top: -1px; }

/* Form screen */
.form-header { padding: 52px 20px 16px; background: #f5f5f0; display: flex; align-items: center; gap: 12px; }
.back-btn { width: 36px; height: 36px; border-radius: 50%; background: #fff; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; color: #1a1a1a; flex-shrink: 0; }
.form-title { font-size: 20px; font-weight: 600; color: #1a1a1a; }

.form-content { flex: 1; padding: 8px 16px 16px; overflow-y: auto; }

.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
.field input { width: 100%; background: #fff; border: none; border-radius: 14px; padding: 13px 16px; font-size: 14px; color: #1a1a1a; font-family: 'Inter', sans-serif; outline: none; font-weight: 400; }
.field input::placeholder { color: #ccc; }
.field input:focus { box-shadow: 0 0 0 2px #1a1a1a22; }
.field input.error { box-shadow: 0 0 0 2px #e24b4a44; }

.toggle-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.toggle-btn { background: #fff; border: none; border-radius: 14px; padding: 12px 8px; font-size: 12px; font-weight: 500; color: #bbb; cursor: pointer; text-align: center; font-family: 'Inter', sans-serif; transition: all 0.15s; }
.toggle-btn.active-read { background: #e1f5ee; color: #0f6e56; }
.toggle-btn.active-no   { background: #f1efe8; color: #888; }
.toggle-btn.active-inv  { background: #e1f5ee; color: #0f6e56; }
.toggle-btn.active-rej  { background: #fcebeb; color: #a32d2d; }

.submit-btn { width: 100%; background: #1a1a1a; color: #fff; border: none; border-radius: 16px; padding: 15px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; font-family: 'Inter', sans-serif; }
</style>
</head>
<body>

<!-- MAIN SCREEN -->
<div class="screen active" id="screen-main">
  <div class="header">
    <div class="greeting">Good morning</div>
    <div class="username" id="display-name">Job Tracker</div>
  </div>

  <div class="hero-card">
    <div class="hero-label">
      <span>Всего откликов</span>
      <span class="hero-badge" id="hero-month">апрель 2026</span>
    </div>
    <div class="hero-num" id="hero-total">0</div>
    <div class="hero-sub" id="hero-sub">Начни добавлять отклики</div>
  </div>

  <div class="quick-stats">
    <div class="qs"><div class="qs-num green" id="cnt-inv">0</div><div class="qs-label">Приглашения</div></div>
    <div class="qs"><div class="qs-num red"   id="cnt-rej">0</div><div class="qs-label">Отказы</div></div>
    <div class="qs"><div class="qs-num gray"  id="cnt-wait">0</div><div class="qs-label">Без ответа</div></div>
  </div>

  <div class="section-header">
    <div class="section-title">Последние отклики</div>
    <div class="see-all">все</div>
  </div>

  <div id="rows-container">
    <div class="empty-hint">Пока нет откликов.<br>Нажми + чтобы добавить первый.</div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item">
      <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="2" fill="#1a1a1a"/><rect x="11" y="2" width="7" height="7" rx="2" fill="#ddd"/><rect x="2" y="11" width="7" height="7" rx="2" fill="#ddd"/><rect x="11" y="11" width="7" height="7" rx="2" fill="#ddd"/></svg>
      </div>
      <div class="nav-label active">Главная</div>
    </div>
    <div class="nav-item">
      <button class="fab-btn" onclick="openForm()"><span class="fab-plus">+</span></button>
    </div>
    <div class="nav-item">
  </div>
</div>

<!-- FORM SCREEN -->
<div class="screen" id="screen-form">
  <div class="form-header">
    <button class="back-btn" onclick="goBack()">‹</button>
    <div class="form-title">Новый отклик</div>
  </div>

  <div class="form-content">
    <div class="field">
      <label>Компания *</label>
      <input id="f-company" type="text" placeholder="Название компании" />
    </div>
    <div class="field">
      <label>Должность *</label>
      <input id="f-role" type="text" placeholder="Product Manager" />
    </div>
    <div class="field">
      <label>Зарплата (₽)</label>
      <input id="f-salary" type="number" placeholder="200000" />
    </div>
    <div class="field">
      <label>Статус прочтения</label>
      <div class="toggle-row">
        <div class="toggle-btn active-read" id="read-yes" onclick="setRead('yes')">Прочитано</div>
        <div class="toggle-btn"            id="read-no"  onclick="setRead('no')">Не прочитано</div>
      </div>
    </div>
    <div class="field">
      <label>Ответ</label>
      <div class="toggle-row">
        <div class="toggle-btn active-no" id="ans-wait" onclick="setAns('wait')">Без ответа</div>
        <div class="toggle-btn"           id="ans-inv"  onclick="setAns('inv')">Приглашение</div>
      </div>
      <div class="toggle-row" style="margin-top:8px">
        <div class="toggle-btn" id="ans-rej" onclick="setAns('rej')">Отказ</div>
        <div></div>
      </div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitEntry()">Добавить отклик</button>
  </div>

  <div class="bottom-nav">
    <div class="nav-item"></div>
    <div class="nav-item">
      <button class="fab-btn" style="background:#eee;" onclick="goBack()"><span class="fab-plus" style="color:#999;">✕</span></button>
    </div>
    <div class="nav-item"></div>
  </div>
</div>

<script>
let entries = [];
let readVal = 'yes';
let ansVal  = 'wait';

const months = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const now = new Date();
document.getElementById('hero-month').textContent = months[now.getMonth()] + ' ' + now.getFullYear();

async function loadEntries() {
  try {
    const resp = await fetch('/api/entries');
    entries = await resp.json();
    renderAll();
  } catch(e) {
    document.getElementById('rows-container').innerHTML = '<div class="empty-hint">Ошибка загрузки данных</div>';
  }
}

function openForm() {
  document.getElementById('f-company').value = '';
  document.getElementById('f-role').value = '';
  document.getElementById('f-salary').value = '';
  document.getElementById('f-company').classList.remove('error');
  document.getElementById('f-role').classList.remove('error');
  setRead('yes'); setAns('wait');
  document.getElementById('screen-main').classList.remove('active');
  document.getElementById('screen-form').classList.add('active');
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('screen-form').classList.remove('active');
  document.getElementById('screen-main').classList.add('active');
  window.scrollTo(0, 0);
}

function setRead(v) {
  readVal = v;
  document.getElementById('read-yes').className = 'toggle-btn' + (v==='yes' ? ' active-read' : '');
  document.getElementById('read-no').className  = 'toggle-btn' + (v==='no'  ? ' active-no'  : '');
}

function setAns(v) {
  ansVal = v;
  const map = { wait:'active-no', inv:'active-inv', rej:'active-rej' };
  ['wait','inv','rej'].forEach(k => {
    document.getElementById('ans-'+k).className = 'toggle-btn' + (v===k ? ' '+map[k] : '');
  });
}

async function submitEntry() {
  const company = document.getElementById('f-company').value.trim();
  const role    = document.getElementById('f-role').value.trim();
  const salary  = document.getElementById('f-salary').value.trim();

  document.getElementById('f-company').classList.toggle('error', !company);
  document.getElementById('f-role').classList.toggle('error', !role);
  if (!company || !role) return;

  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Сохранение...';
  btn.disabled = true;

  const statusMap = { wait: 'Без ответа', inv: 'Приглашение', rej: 'Отказ' };
  const readMap   = { yes: 'Да', no: 'Нет' };

  await fetch('/api/entries', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      company, role,
      salary: salary ? parseInt(salary).toLocaleString('ru-RU') + ' ₽' : '',
      read: readMap[readVal],
      status: statusMap[ansVal],
    })
  });

  btn.textContent = 'Добавить отклик';
  btn.disabled = false;
  await loadEntries();
  goBack();
}

function renderAll() {
  const total = entries.length;
  const inv  = entries.filter(e => e.status === 'Приглашение').length;
  const rej  = entries.filter(e => e.status === 'Отказ').length;
  const wait = entries.filter(e => e.status === 'Без ответа').length;

  document.getElementById('hero-total').textContent = total;
  document.getElementById('cnt-inv').textContent  = inv;
  document.getElementById('cnt-rej').textContent  = rej;
  document.getElementById('cnt-wait').textContent = wait;

  const sub = document.getElementById('hero-sub');
  if (total === 0) { sub.textContent = 'Начни добавлять отклики'; }
  else { sub.textContent = '+' + Math.round(inv/total*100) + '% конверсия в приглашения'; }

  const container = document.getElementById('rows-container');
  if (!entries.length) {
    container.innerHTML = '<div class="empty-hint">Пока нет откликов.<br>Нажми + чтобы добавить первый.</div>';
    return;
  }

  const badgeMap  = { 'Приглашение':'invite', 'Отказ':'reject', 'Без ответа':'wait' };
  container.innerHTML = [...entries].reverse().slice(0, 10).map(e => `
    <div class="card">
      <div class="card-icon">${e.company.charAt(0).toUpperCase()}</div>
      <div class="card-info">
        <div class="card-company">${e.company}</div>
        <div class="card-role">${e.role}</div>
      </div>
      <div class="card-right">
        <div class="card-salary">${e.salary || '—'}</div>
        <div class="badge ${badgeMap[e.status] || 'wait'}">${e.status || 'Без ответа'}</div>
      </div>
    </div>
  `).join('');
}

loadEntries();
</script>
</body>
</html>
